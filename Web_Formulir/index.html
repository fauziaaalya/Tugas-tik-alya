<!DOCTYPE html>
<html>
<head>
    <title>Belajar Membuat Form</title>
    <style>
        body {
            background-image: url('https://preview.redd.it/recently-resized-pusheen-images-to-wallpaper-size-thought-v0-biackl53bs7g1.png?width=640&crop=smart&auto=webp&s=db9c6d40c32fc4180331f16a7d1a768e7f09a0ed');
            background-size: cover;        
            font-family: sans-serif;
        }
        .kotak-login {
            background-color: white;
            width: 350px;
            padding: 30px;
            margin: 100px auto; /* Posisi di tengah */
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1); /* Efek bayangan estetik */
            text-align: center;
        }
        /* CSS KHUSUS UNTUK KOTAK INPUT */
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        /* CSS KHUSUS UNTUK TOMBOL */
        button {
            width: 100%;
            padding: 12px;
            background-color: #d0b8f9; /* Warna biru tombol sosmed */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="kotak-login">
        <h2>Pusheen</h2>
        
        <form>
            <input type="text" placeholder="Siapa namamu?">
            <input type="password" placeholder="Bikin password rahasia">
            <input type="color">
            <input type="date">
            <button type="button">ayoo join</button>
        </form>

    </div>

</body>
</html>
